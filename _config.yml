site: Ashutosh Bhosale
url: https://ashutoshbhosale.com
title: Ashutosh Bhosale
description: Engineer, Photographer, Writer
twitter:
  username: wowashuwow
  card: summary_large_image
  creator: #yourusername
author:
  twitter: wowashuwow
  name: Ashutosh Bhosale
  avatar:
  email: #youremail
  url: #yoururl
permalink: pretty

timezone: Asia/Kolkata

baseurl: ""

highlighter: none

exclude:
  - .jekyll-cache
  
compress_html:
  clippings: all
  comments: ["<!-- ", " -->"]

sass:
  sass_dir:          _sass
  style:            :compressed

plugins:
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-sitemap  

collections:
  pages:
    output: true
    permalink: /:name
  posts:
    output: true
    permalink: /:title/
  
defaults:
  -
    scope:
      path: ""
    values:
      layout: "default"
  -
    scope:
      path: ""
      type: "pages"
    values:
      layout: "page"
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

future: true
